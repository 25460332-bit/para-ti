<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Kenia 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(#ffc0cb, #ffe4ec);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.hidden { display: none; }

.btn {
  background: #ff69b4;
  border: none;
  padding: 12px 20px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* LIBRO */
.book {
  width: 600px;
  height: 400px;
  perspective: 1500px;
  cursor: pointer;
}

.page {
  width: 100%;
  height: 100%;
  background: white;
  position: absolute;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  transform-origin: left;
  transition: transform 1s;
}

.book.open .page {
  transform: rotateY(-180deg);
}

/* TEXTO */
#texto {
  font-size: 18px;
  line-height: 1.4;
}

/* corazones */
.heart {
  position: fixed;
  color: #ff4d88;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="screen" id="login">
  <h1>💖 Solo para Kenia 💖</h1>
  <input type="password" id="pass" placeholder="Contraseña">
  <button class="btn" onclick="check()">Entrar 💌</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- LIBRO -->
<div class="screen hidden" id="carta">
  
  <div class="book" onclick="abrirLibro(this)">
    <div class="page">
      <div id="texto"></div>
    </div>
  </div>

  <button class="btn hidden" id="playAudioBtn" onclick="reproducirAudio()">
    🎧 Reproducir mensaje 💖
  </button>

  <audio id="miAudio" src="audio.mp3"></audio>

</div>

<script>
const mensaje = `💖 La dueña de mi corazón ❤️ 💖

No sabía cómo decir todo esto...
pero quería que fuera especial, algo solo para ti 💕

Desde que estás en mi vida, todo se siente diferente...
más bonito, más tranquilo, más feliz ✨

Eres alguien muy importante para mí
y sinceramente no quiero perderte 💗

Eres la persona más importante en mi vida y te agradezco eternamente
todos los momentos que pasas a mi lado, aun así sea algo básico
o algo importante.

Te quiero demasiado, te amo como a nadie más en la vida
y quiero que entiendas que en mi corazón siempre quedarás marcada 💖

💖 Eres la dueña de mi vida entera 💖`;

let yaAbierto = false;

function check() {
  const pass = document.getElementById("pass").value;
  
  if (pass === "la dueña de mi vida entera") {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("carta").classList.remove("hidden");
  } else {
    document.getElementById("error").innerText = "Contraseña incorrecta 💔";
  }
}

function abrirLibro(el) {
  if (yaAbierto) return;

  yaAbierto = true;
  el.classList.add("open");
  escribirTexto();
}

function escribirTexto() {
  const contenedor = document.getElementById("texto");
  const botonAudio = document.getElementById("playAudioBtn");

  let i = 0;

  function escribir() {
    if (i < mensaje.length) {
      if (mensaje.charAt(i) === "\n") {
        contenedor.innerHTML += "<br>";
      } else {
        contenedor.innerHTML += mensaje.charAt(i);
      }
      i++;
      setTimeout(escribir, 35);
    } else {
      botonAudio.classList.remove("hidden");
    }
  }

  escribir();
}

function reproducirAudio() {
  document.getElementById("miAudio").play();
}

/* corazones */
function crearCorazon() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
