<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(#ffc0cb, #ffe4ec);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* contenedores */
.screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.hidden {
  display: none;
}

/* input y botón */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

button {
  background: #ff69b4;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  color: white;
  cursor: pointer;
}

/* texto */
#contenido {
  max-width: 600px;
  font-size: 20px;
  line-height: 1.5;
}

/* animación aparición */
.fade {
  opacity: 0;
  animation: aparecer 2s forwards;
}

@keyframes aparecer {
  to { opacity: 1; }
}

/* corazones */
.heart {
  position: fixed;
  color: #ff4d88;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="screen" id="login">
  <h1>💖 Solo para ti 💖</h1>
  <input type="password" id="pass" placeholder="Contraseña">
  <button onclick="check()">Entrar</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- CONTENIDO -->
<div class="screen hidden" id="contenido">

  <h1 id="titulo"></h1>
  <p id="texto"></p>

</div>

<script>
const titulo = "Kenia Hernández Evangelista 💖";

const mensaje = `Eres la persona más importante en mi vida y te agradezco eternamente
todos los momentos que pasas a mi lado, aun así sea algo básico o algo importante.

Te quiero demasiado, te amo como a nadie más en la vida
y quiero que entiendas que en mi corazón siempre quedarás marcada 💖 
la verdad para serte sincero no he sido muy bueno con las palabras ni supe que decir, pero queria q fuera un detallito pequeño,te amito😍
posdata:Me mata el sueño  



de tu niño chikito para la dueña de mi existir`;

function check() {
  const pass = document.getElementById("pass").value;

  if (pass === "la dueña de mi vida entera") {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("contenido").classList.remove("hidden");

    escribirTitulo();
  } else {
    document.getElementById("error").innerText = "Contraseña incorrecta 💔";
  }
}

function escribirTitulo() {
  const t = document.getElementById("titulo");
  let i = 0;

  function escribir() {
    if (i < titulo.length) {
      t.innerHTML += titulo.charAt(i);
      i++;
      setTimeout(escribir, 50);
    } else {
      t.classList.add("fade");
      escribirTexto();
    }
  }

  escribir();
}

function escribirTexto() {
  const txt = document.getElementById("texto");
  let i = 0;

  function escribir() {
    if (i < mensaje.length) {
      if (mensaje.charAt(i) === "\n") {
        txt.innerHTML += "<br>";
      } else {
        txt.innerHTML += mensaje.charAt(i);
      }
      i++;
      setTimeout(escribir, 30);
    } else {
      txt.classList.add("fade");
    }
  }

  escribir();
}

/* corazones */
function crearCorazon() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
